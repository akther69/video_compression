<!DOCTYPE html>
<html>

<head>

    <title>Video Compressor</title>

    <style>

        body{

            background:#0f172a;

            color:white;

            font-family:Arial;

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;
        }

        .container{

            width:500px;

            background:#111827;

            padding:40px;

            border-radius:20px;

            text-align:center;
        }

        button{

            padding:15px 25px;

            border:none;

            background:#00b894;

            color:white;

            border-radius:10px;

            cursor:pointer;
        }

        #progress-container{

            margin-top:20px;

            display:none;
        }

        #progress-bg{

            width:100%;

            height:30px;

            background:#1e293b;

            border-radius:50px;

            overflow:hidden;
        }

        #progress-bar{

            width:0%;

            height:100%;

            background:#00cec9;

            line-height:30px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Video Compressor</h1>

    <form id="upload-form">

        {% csrf_token %}

        <input type="file"
               name="video"
               required>

        <br><br>

        <button type="submit">

            Compress Video

        </button>

    </form>

    <div id="progress-container">

        <br>

        <div id="progress-bg">

            <div id="progress-bar">

                0%

            </div>

        </div>

    </div>

    <br>

    <div id="download-section"></div>

</div>

<script>

const form =
    document.getElementById(
        "upload-form"
    );

form.addEventListener(
    "submit",
    async function(e){

    e.preventDefault();

    document.getElementById(
        "progress-container"
    ).style.display = "block";

    const formData =
        new FormData(form);

    const response =
        await fetch(
            "/compress/",
            {
                method:"POST",
                body:formData
            }
        );

    const data =
        await response.json();

    const taskId =
        data.task_id;

    const interval =
        setInterval(async ()=>{

        const progressResponse =
            await fetch(
                `/progress/${taskId}/`
            );

        const progressData =
            await progressResponse.json();

        const progress =
            progressData.progress;

        const progressBar =
            document.getElementById(
                "progress-bar"
            );

        progressBar.style.width =
            progress + "%";

        progressBar.innerHTML =
            progress + "%";

        if(progress >= 100){

            clearInterval(interval);

            document.getElementById(
                "download-section"
            ).innerHTML = `

                <br>

                <a href="${progressData.download_url}"
                   download
                   style="
                     color:#00cec9;
                     font-size:20px;
                   ">

                    Download Video

                </a>
            `;
        }

    }, 1000);

});

</script>
</body>

</html>
